---
# ============================================================================
#  cPanel Git Version Control — deployment tasks (720fundmenow.com)
#
#  Runs on "Deploy HEAD Commit". Copies the app from the cloned repo
#  (~/repositories/sparkman) into the live web root, then rebuilds caches.
#
#  DEPLOYPATH is this account's docroot. NOT touched by any task:
#    .env  (secrets, lives only on the server)  •  storage/ runtime data
# ============================================================================
deployment:
  tasks:
    - export DEPLOYPATH=/home/fundmen1/public_html/

    # ---- Copy application code into the web root (merges/overwrites) ----
    - /bin/cp -R app $DEPLOYPATH
    - /bin/cp -R bootstrap $DEPLOYPATH
    - /bin/cp -R config $DEPLOYPATH
    - /bin/cp -R database $DEPLOYPATH
    - /bin/cp -R public $DEPLOYPATH
    - /bin/cp -R resources $DEPLOYPATH
    - /bin/cp -R routes $DEPLOYPATH
    - /bin/cp -R tests $DEPLOYPATH
    - /bin/cp artisan $DEPLOYPATH
    - /bin/cp composer.json $DEPLOYPATH
    - /bin/cp composer.lock $DEPLOYPATH
    - /bin/cp .htaccess $DEPLOYPATH

    # ---- Dependencies (vendor is not in the repo; install/refresh it) ----
    - cd $DEPLOYPATH && /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader 2>&1 || true

    # ---- Clear old caches so new code/config/views take effect ----
    - cd $DEPLOYPATH && php artisan config:clear 2>&1 || true
    - cd $DEPLOYPATH && php artisan route:clear 2>&1 || true
    - cd $DEPLOYPATH && php artisan view:clear 2>&1 || true

    # ---- Database + storage symlink (safe no-ops if already done) ----
    - cd $DEPLOYPATH && php artisan migrate --force 2>&1 || true
    - cd $DEPLOYPATH && php artisan storage:link 2>&1 || true

    # ---- Rebuild caches for production performance ----
    - cd $DEPLOYPATH && php artisan config:cache 2>&1 || true
    - cd $DEPLOYPATH && php artisan route:cache 2>&1 || true
    - cd $DEPLOYPATH && php artisan view:cache 2>&1 || true
